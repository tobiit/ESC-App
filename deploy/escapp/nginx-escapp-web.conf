# ==========================================================================
# ESC-App – Nginx Konfiguration: Web-Frontend
# Domain: esc.basisadresse.de
# Statische Dateien aus dem Vite-Build (dist/)
# ==========================================================================

server {
    listen 80;
    listen [::]:80;
    server_name esc.basisadresse.de;

    # Certbot wird hier automatisch den Redirect auf 443 einfügen.
    # Bis dahin: statische Dateien direkt ausliefern.

    root /var/www/esc.basisadresse.de;
    index index.html;

    # Gzip-Kompression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache für statische Assets (JS, CSS, Bilder)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA-Routing: Alle Routen auf index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health-Check Endpunkt für Monitoring
    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Keine Logdateien für Favicon/Robots
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Zugriff auf versteckte Dateien verweigern
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    access_log /var/log/nginx/esc.basisadresse.de.access.log;
    error_log  /var/log/nginx/esc.basisadresse.de.error.log;
}
