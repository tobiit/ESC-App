# ==========================================================================
# ESC-App – Nginx Konfiguration: API Backend
# Domain: api.basisadresse.de
# Pfad:   /escappapi/ → Reverse Proxy auf Backend (localhost:4000)
# ==========================================================================
#
# HINWEIS: Falls api.basisadresse.de bereits als Server-Block existiert,
# stattdessen nur den location-Block (siehe escappapi-location.snippet.conf)
# in den bestehenden Server-Block einfügen!
#

server {
    listen 80;
    listen [::]:80;
    server_name api.basisadresse.de;

    # Certbot wird hier automatisch den Redirect auf 443 einfügen.

    # ── ESC-App API unter /escappapi/ ─────────────────────────────────────
    include /etc/nginx/snippets/escappapi-location.conf;

    # ── Fallback für andere Pfade (anpassen bei Bedarf) ───────────────────
    location / {
        return 404 '{"message":"Not Found"}\n';
        add_header Content-Type application/json always;
    }

    access_log /var/log/nginx/api.basisadresse.de.access.log;
    error_log  /var/log/nginx/api.basisadresse.de.error.log;
}
