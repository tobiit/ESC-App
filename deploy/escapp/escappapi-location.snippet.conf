# ==========================================================================
# ESC-App – Nginx Location Snippet für die API
# Zum Einfügen in einen bestehenden server{}-Block für api.basisadresse.de
#
# Wird nach /etc/nginx/snippets/escappapi-location.conf kopiert
# und per "include /etc/nginx/snippets/escappapi-location.conf;" eingebunden.
# ==========================================================================

# Redirect /escappapi → /escappapi/
location = /escappapi {
    return 301 $scheme://$host/escappapi/;
}

# Reverse Proxy: /escappapi/* → localhost:4000/*
location /escappapi/ {
    proxy_pass http://127.0.0.1:4000/;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "";

    # Timeouts
    proxy_connect_timeout 30s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # Buffering
    proxy_buffering on;
    proxy_buffer_size 8k;
    proxy_buffers 8 8k;

    # Body-Größe (für CSV-Uploads etc.)
    client_max_body_size 10m;
}
